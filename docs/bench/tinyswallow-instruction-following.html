<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>TinySwallow 指示追従性 (system vs user) ベンチ</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         margin: 16px; max-width: 1300px; color: #222; }
  h1 { font-size: 20px; }
  h2 { font-size: 16px; margin-top: 1.5em; }
  button { padding: 8px 14px; margin-right: 8px; font-size: 14px; cursor: pointer; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  table { border-collapse: collapse; margin-top: 8px; font-size: 12px; width: 100%; }
  th, td { border: 1px solid #bbb; padding: 4px 8px; text-align: left; vertical-align: top; }
  th { background: #f0f0f0; }
  .pass { background: #e0ffe4; }
  .fail { background: #ffd7d7; }
  .out { font-family: ui-monospace, monospace; font-size: 11px; max-width: 380px; word-break: break-word; white-space: pre-wrap; }
  #status { color: #555; font-family: ui-monospace, monospace; font-size: 12px; white-space: pre-wrap; }
  #summary { background: #f0f7ff; padding: 12px; border: 1px solid #cde; margin: 12px 0; font-size: 14px; }
  .num { font-family: ui-monospace, monospace; }
  .opt { margin: 6px 0; }
  label { margin-right: 10px; }
  pre { background: #f4f4f4; padding: 10px; font-size: 12px; max-height: 200px; overflow: auto; }
</style>
</head>
<body>
<h1>TinySwallow 指示追従性ベンチ</h1>
<p>
  各テストごとに「指示」を <strong>system role</strong> に入れた場合と、
  <strong>user role</strong> (指示 + ユーザー質問を結合) に入れた場合の 2 通りで生成し、
  指示が守られているかを mechanical な evaluator で判定する。
</p>

<div class="opt">
  <strong>Backend:</strong>
  <label><input type="radio" name="dev" value="webgpu" checked /> WebGPU</label>
  <label><input type="radio" name="dev" value="wasm" /> WASM (遅い)</label>
</div>
<div class="opt">
  <strong>Temperature:</strong>
  <input type="number" id="temp" min="0" max="2" step="0.1" value="0" style="width:60px" />
  (0 で greedy / 決定論的)
</div>
<div class="opt">
  <strong>Max new tokens:</strong>
  <input type="number" id="maxtok" min="20" max="500" value="100" style="width:60px" />
</div>

<p>
  <button id="run">全テスト実行</button>
  <button id="run-one">先頭 1 件だけ実行 (動作確認)</button>
  <button id="clear">クリア</button>
</p>

<div id="status">準備中…</div>

<div id="summary" hidden></div>

<h2>結果</h2>
<table id="result" hidden>
  <thead>
    <tr>
      <th>#</th>
      <th>指示</th>
      <th>ユーザ質問</th>
      <th>system 出力</th>
      <th>system 判定</th>
      <th>user 出力</th>
      <th>user 判定</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>ログ</h2>
<pre id="log"></pre>

<script type="module">
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.7.4/dist/transformers.min.js';
import { TESTS, cleanOutput } from './tinyswallow-tests.mjs';
env.allowLocalModels = false;

const MODEL_ID = 'onnx-community/TinySwallow-1.5B-Instruct-ONNX';

const elStatus = document.getElementById('status');
const elLog = document.getElementById('log');
const elTable = document.getElementById('result');
const elTbody = elTable.querySelector('tbody');
const elSummary = document.getElementById('summary');

function log(s) {
  elLog.textContent += s + '\n';
  elLog.scrollTop = elLog.scrollHeight;
}
function setStatus(s) { elStatus.textContent = s; }


// ──────────────────────────────────────────────
// 実行ロジック
// ──────────────────────────────────────────────

let pipe = null;
async function ensurePipe() {
  if (pipe) return pipe;
  const device = document.querySelector('input[name=dev]:checked').value;
  setStatus(`Loading TinySwallow (${device}) ...`);
  pipe = await pipeline('text-generation', MODEL_ID, {
    device,
    dtype: device === 'webgpu' ? 'q4f16' : 'q4',
    progress_callback: (p) => {
      if (p.status === 'progress') setStatus(`Loading: ${p.file} ${Math.round((p.progress ?? 0))}%`);
    },
  });
  setStatus('Loaded.');
  return pipe;
}

async function generateOne(messages, maxTok, temp) {
  const out = await pipe(messages, {
    max_new_tokens: maxTok,
    temperature: temp,
    do_sample: temp > 0,
    repetition_penalty: 1.1,
  });
  const first = Array.isArray(out) ? out[0] : out;
  const gen = first?.generated_text;
  if (Array.isArray(gen)) {
    const last = gen[gen.length - 1];
    return typeof last?.content === 'string' ? last.content : '';
  }
  return typeof gen === 'string' ? gen : '';
}

async function runAll(limit) {
  await ensurePipe();
  elTable.hidden = false;
  elTbody.innerHTML = '';
  elSummary.hidden = true;

  const maxTok = parseInt(document.getElementById('maxtok').value, 10);
  const temp = parseFloat(document.getElementById('temp').value);
  const tests = limit ? TESTS.slice(0, limit) : TESTS;

  let sysPass = 0, userPass = 0;
  const results = [];

  for (let i = 0; i < tests.length; i++) {
    const { instruction, q, check } = tests[i];
    setStatus(`(${i + 1}/${tests.length}) ${instruction.slice(0, 30)}`);

    // condition A: system に指示
    const sysMsgs = [
      { role: 'system', content: instruction },
      { role: 'user', content: q },
    ];
    // condition B: user に指示 + 質問結合
    const userMsgs = [
      { role: 'user', content: `${instruction}\n\n質問: ${q}` },
    ];

    const sysOutRaw = await generateOne(sysMsgs, maxTok, temp);
    const sysOut = cleanOutput(sysOutRaw);
    const sysJudge = check(sysOut);

    const userOutRaw = await generateOne(userMsgs, maxTok, temp);
    const userOut = cleanOutput(userOutRaw);
    const userJudge = check(userOut);

    if (sysJudge.pass) sysPass++;
    if (userJudge.pass) userPass++;
    results.push({ i, instruction, q, sysOut, sysJudge, userOut, userJudge });

    // 1 行 append
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${i + 1}</td>
      <td>${escapeHtml(instruction)}</td>
      <td>${escapeHtml(q)}</td>
      <td class="out">${escapeHtml(sysOut)}</td>
      <td class="${sysJudge.pass ? 'pass' : 'fail'}">${sysJudge.pass ? 'PASS' : 'FAIL'}<br><small>${escapeHtml(sysJudge.reason ?? '')}</small></td>
      <td class="out">${escapeHtml(userOut)}</td>
      <td class="${userJudge.pass ? 'pass' : 'fail'}">${userJudge.pass ? 'PASS' : 'FAIL'}<br><small>${escapeHtml(userJudge.reason ?? '')}</small></td>
    `;
    elTbody.appendChild(tr);
    log(`#${i + 1}: sys=${sysJudge.pass ? 'OK' : 'NG'} user=${userJudge.pass ? 'OK' : 'NG'} | "${instruction}"`);
  }

  setStatus('done.');
  const n = tests.length;
  elSummary.hidden = false;
  elSummary.innerHTML = `
    <strong>結果サマリ</strong> (${n} テスト, temp=${temp}, maxTok=${maxTok}):
    <br>system に指示: <strong class="num">${sysPass}/${n} = ${(sysPass / n * 100).toFixed(1)}%</strong>
    <br>user に指示:   <strong class="num">${userPass}/${n} = ${(userPass / n * 100).toFixed(1)}%</strong>
    <br>差分: <span class="num">${sysPass - userPass > 0 ? '+' : ''}${sysPass - userPass}</span>
      (system が ${sysPass > userPass ? '勝ち' : sysPass < userPass ? '負け' : '同点'})
  `;
}

function escapeHtml(s) {
  return String(s).replace(/[<>&"']/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('run').addEventListener('click', () => runAll().catch(e => { log('ERR ' + e.message); console.error(e); }));
document.getElementById('run-one').addEventListener('click', () => runAll(1).catch(e => { log('ERR ' + e.message); console.error(e); }));
document.getElementById('clear').addEventListener('click', () => {
  elTbody.innerHTML = '';
  elSummary.hidden = true;
  elLog.textContent = '';
});

setStatus('「全テスト実行」を押すと、TinySwallow をロード後 50 ケース × 2 条件 = 100 回生成します (WebGPU で ~5 分目安)。');
</script>
</body>
</html>
