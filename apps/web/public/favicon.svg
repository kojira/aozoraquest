<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-label="あおぞらくえすと">
  <!-- 背景 (丸い空色) -->
  <rect width="64" height="64" rx="12" fill="#4aa6e2"/>
  <!-- 雲の体 -->
  <g fill="#f6fbff">
    <circle cx="20" cy="36" r="12"/>
    <circle cx="32" cy="28" r="16"/>
    <circle cx="44" cy="36" r="12"/>
    <ellipse cx="32" cy="42" rx="20" ry="9"/>
  </g>
  <!-- 下の影 -->
  <ellipse cx="32" cy="47" rx="16" ry="2.5" fill="rgba(35, 70, 120, 0.25)"/>
  <!-- 目 -->
  <ellipse cx="26" cy="32" rx="2.2" ry="3" fill="#1c2b44"/>
  <ellipse cx="38" cy="32" rx="2.2" ry="3" fill="#1c2b44"/>
  <circle cx="27" cy="31" r="0.8" fill="#ffffff"/>
  <circle cx="39" cy="31" r="0.8" fill="#ffffff"/>
  <!-- 頬 -->
  <circle cx="22" cy="38" r="2.6" fill="#ffb8c5" opacity="0.6"/>
  <circle cx="42" cy="38" r="2.6" fill="#ffb8c5" opacity="0.6"/>
  <!-- 口 -->
  <path d="M 28 39 Q 32 42 36 39" stroke="#1c2b44" stroke-width="1.6" fill="none" stroke-linecap="round"/>
</svg>
