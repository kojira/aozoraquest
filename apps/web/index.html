<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <!-- viewport-fit=cover: モバイルで全幅 footer を最下部に密着させる際、env(safe-area-inset-*)
       を有効化して iOS ホームインジケータと被らないようにするため (footer の padding-bottom 参照)。 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#378ADD">
  <title>あおぞらくえすと</title>
  <meta name="description" content="Bluesky の投稿から、今のあなたをジョブとステータスで可視化。毎日のクエストで、目指す姿へ。" />

  <!-- リンク共有 (Bluesky / X / Discord 等) のプレビューカード。og:url / og:image は
       絶対 URL が必須なので本番 (aozoraquest.app) を明示。dev でも同じ画像を指す。
       og.png は scripts/generate-og-image.mjs で生成 (1200×630)。 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="あおぞらくえすと" />
  <meta property="og:locale" content="ja_JP" />
  <meta property="og:url" content="https://aozoraquest.app/" />
  <meta property="og:title" content="あおぞらくえすと" />
  <meta property="og:description" content="Bluesky の投稿から、今のあなたをジョブとステータスで可視化。毎日のクエストで、目指す姿へ。" />
  <meta property="og:image" content="https://aozoraquest.app/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="あおぞらくえすと — 青空と精霊のマスコット" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="あおぞらくえすと" />
  <meta name="twitter:description" content="Bluesky の投稿から、今のあなたをジョブとステータスで可視化。毎日のクエストで、目指す姿へ。" />
  <meta name="twitter:image" content="https://aozoraquest.app/og.png" />
  <meta name="twitter:image:alt" content="あおぞらくえすと — 青空と精霊のマスコット" />
  <!-- テーマの初回ペイント前適用 (FOUC 防止)。CSS の :root 既定はダークなので、
       ライト/システム(=OS ライト) のユーザーは JS バンドル評価まで一瞬ダークが
       ちらつく。ここで lib/theme.ts と同じ解決を first paint 前に走らせて
       <html data-theme> を確定させる。main.tsx の initTheme() が後で再適用
       (冪等) + system 監視を張る。キーは prefs.ts の KEY_THEME と一致させること。 -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('aozoraquest:theme');
        if (t !== 'light' && t !== 'dark' && t !== 'system') t = 'system';
        var resolved = t;
        if (t === 'system') {
          resolved = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches)
            ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', resolved);
      } catch (e) { /* localStorage 不可時は CSS の :root 既定 (ダーク) のまま */ }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
