name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  web-ci:
    runs-on: ubuntu-latest
    # GitHub Environments に置いた variables / secrets を使うために environment を指定する。
    # main 向けと dev 向けで env vars が違う場合は branch ごとに分ける。
    environment: ${{ github.ref == 'refs/heads/main' && 'main' || 'dev' }}
    steps:
      - uses: actions/checkout@v4

      # 変更が CSS / docs / md だけかを判定し、そうなら重い e2e (Playwright) を
      # スキップして CI を高速化する。コード (ts/tsx/json/html/config/packages 等)
      # が 1 つでも変われば e2e を回す = 安全側のデフォルト。main への push/PR は
      # 本番経路なので常に e2e を回す。
      - name: Detect change scope
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'apps/web/**/*.ts'
              - 'apps/web/**/*.tsx'
              - 'apps/web/**/*.js'
              - 'apps/web/**/*.jsx'
              - 'apps/web/**/*.html'
              - 'apps/web/**/*.json'
              - 'apps/web/*.{ts,js,mjs,cjs,json}'
              # public 配下のアセット (card-art SVG 等) は e2e (card-share-size.spec)
              # が参照するので、変更時は e2e を回す (CSS 微修正の高速パスには含めない)。
              - 'apps/web/public/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - '.github/workflows/**'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @aozoraquest/web typecheck

      - name: Unit tests (core + web)
        run: |
          pnpm --filter @aozoraquest/core test
          pnpm --filter @aozoraquest/web test

      - name: Validate data (jobs.ts ↔ jobs.json 等の整合)
        run: pnpm validate:data

      - name: Build
        # build 時に参照される env vars。GitHub の Environment Variables
        # (Settings → Environments → dev / production → Environment variables) で
        # branch ごとに設定する。job 冒頭の environment: で参照先を切替。
        # 必須:
        #   VITE_APP_URL  (dev: https://dev.aozoraquest.app, prod: https://aozoraquest.app)
        #   VITE_NSID_ROOT (= app.aozoraquest 等のプロジェクト固有 prefix)
        # 任意:
        #   VITE_NSID_ENV (dev では "dev"、prod では未設定 / 空)
        # CI 限定:
        #   VITE_INCLUDE_DEBUG=1 — /debug/* route (debug-card / debug-radar /
        #     debug-me) を preview ビルドに含める。card-share-size.spec.ts が
        #     /debug/card に依存しているため。Cloudflare Workers Builds 側では
        #     未設定なので本番に debug ルートは含まれない。
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_NSID_ROOT: ${{ vars.VITE_NSID_ROOT }}
          VITE_NSID_ENV: ${{ vars.VITE_NSID_ENV }}
          VITE_INCLUDE_DEBUG: '1'
        run: pnpm --filter @aozoraquest/web build

      # Playwright のブラウザバイナリをキャッシュして install を高速化
      # (e2e を回すときだけ。キーは lockfile に紐付け)。
      - name: Cache Playwright browsers
        if: steps.changes.outputs.code == 'true' || github.ref == 'refs/heads/main'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.changes.outputs.code == 'true' || github.ref == 'refs/heads/main'
        run: pnpm --filter @aozoraquest/web exec playwright install chromium --with-deps

      - name: E2E (smoke + model URL sanity)
        # CSS / docs だけの変更ではスキップ (typecheck / unit / build は常に回る)。
        if: steps.changes.outputs.code == 'true' || github.ref == 'refs/heads/main'
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_NSID_ROOT: ${{ vars.VITE_NSID_ROOT }}
          VITE_NSID_ENV: ${{ vars.VITE_NSID_ENV }}
        run: pnpm --filter @aozoraquest/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
