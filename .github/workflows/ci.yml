name: ci

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  web-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @aozoraquest/web typecheck

      - name: Build
        # build 時必須の env vars。GitHub の Repository Variables
        # (Settings → Secrets and variables → Actions → Variables) で設定する。
        # 値は CF ダッシュボードと同じ (本番 prod の値で OK):
        #   VITE_APP_URL=https://aozoraquest.app
        #   VITE_NSID_ROOT=app.aozoraquest
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_NSID_ROOT: ${{ vars.VITE_NSID_ROOT }}
        run: pnpm --filter @aozoraquest/web build

      - name: Install Playwright browsers
        run: pnpm --filter @aozoraquest/web exec playwright install chromium --with-deps

      - name: E2E (smoke + model URL sanity)
        env:
          VITE_APP_URL: ${{ vars.VITE_APP_URL }}
          VITE_NSID_ROOT: ${{ vars.VITE_NSID_ROOT }}
        run: pnpm --filter @aozoraquest/web test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
